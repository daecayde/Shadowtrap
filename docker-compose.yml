version: "3.8"

services:
  shadowtrap:
    build: .
    container_name: shadowtrap
    restart: unless-stopped
    ports:
      - "2222:2222"   # SSH honeypot
      - "8080:8080"   # HTTP honeypot
      - "2121:2121"   # FTP honeypot
      - "2525:2525"   # SMTP honeypot
      - "2323:2323"   # Telnet honeypot
    volumes:
      - ./logs:/app/logs
      - ./config:/app/config
    environment:
      - TZ=UTC
    networks:
      - honeypot_net
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

networks:
  honeypot_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
